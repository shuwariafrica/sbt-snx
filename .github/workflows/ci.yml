name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SBT_OPTS: "-Xmx4G -Xss4M -XX:ReservedCodeCacheSize=512M"
  JDK_VERSION: "17"
  LLVM_VERSION: "22"

jobs:
  tests:
    name: "[${{ matrix.os }}${{ matrix.env && format(' ({0})', matrix.env) || '' }}: ${{ matrix.arch }}] Tests"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, env: glibc, arch: x86_64, classifier: linux-x86_64, runner: ubuntu-24.04, dockerImage: "shuwariafrica/el10-jdk:17" }
          - { os: linux, env: glibc, arch: aarch64, classifier: linux-aarch_64, runner: ubuntu-24.04-arm, dockerImage: "shuwariafrica/el10-jdk:17" }
          - { os: linux, env: musl, arch: x86_64, classifier: linux-x86_64, runner: ubuntu-24.04, dockerImage: "shuwariafrica/alpine-jdk:17" }
          - { os: linux, env: musl, arch: aarch64, classifier: linux-aarch_64, runner: ubuntu-24.04-arm, dockerImage: "shuwariafrica/alpine-jdk:17" }
          - { os: osx, env: "", arch: aarch64, classifier: osx-aarch_64, runner: macos-26 }
          - { os: windows, env: msvc, arch: x86_64, classifier: windows-x86_64, runner: windows-2025-vs2026 }
          - { os: windows, env: mingw, arch: x86_64, classifier: windows-x86_64, runner: windows-2025 }
          - { os: windows, env: msvc, arch: aarch64, classifier: windows-aarch_64, runner: windows-11-arm }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      DOCKER_IMAGE: ${{ matrix.dockerImage }}
      SNX_EXPECT_CLASSIFIER: ${{ matrix.classifier }}
      SNX_EXPECT_OS: ${{ matrix.os }}
      SNX_EXPECT_ENV: ${{ matrix.env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: "[host] Set up Java"
        if: ${{ !matrix.dockerImage }}
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: ${{ env.JDK_VERSION }}
          check-latest: true
      - name: "[host] Set up sbt"
        if: ${{ !matrix.dockerImage }}
        uses: sbt/setup-sbt@v1
      - name: Set up Coursier cache
        uses: coursier/cache-action@v8
      - name: Generate disposable signing key
        if: ${{ matrix.os == 'linux' }}
        shell: bash
        run: |
          export GNUPGHOME="$PWD/.gnupg-ci"
          mkdir -p "$GNUPGHOME"; chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          printf 'pinentry-mode loopback\nbatch\n' > "$GNUPGHOME/gpg.conf"
          gpg --batch --gen-key <<'EOF'
          %no-protection
          Key-Type: RSA
          Key-Length: 2048
          Name-Real: snx ci
          Name-Email: ci@snx.local
          Expire-Date: 0
          %commit
          EOF
      - name: "[macOS] Install LLVM"
        if: ${{ matrix.os == 'osx' }}
        shell: bash
        run: |
          brew update
          brew install "llvm@${LLVM_VERSION}"
          echo "$(brew --prefix "llvm@${LLVM_VERSION}")/bin" >> "$GITHUB_PATH"
      - name: "[Windows] Set up MSVC"
        if: ${{ matrix.os == 'windows' && matrix.env == 'msvc' }}
        shell: pwsh
        run: |
          $arch = if ('${{ matrix.arch }}' -eq 'aarch64') { 'arm64' } else { 'amd64' }
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
                  -latest -property installationPath
          cmd /c "`"$vs\VC\Auxiliary\Build\vcvarsall.bat`" $arch && set" |
            ForEach-Object { if ($_ -match '^([^=]+)=(.*)$') { "$($Matches[1])=$($Matches[2])" } } |
            Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: "[Windows] Set up MinGW (clang64)"
        if: ${{ matrix.os == 'windows' && matrix.env == 'mingw' }}
        shell: pwsh
        run: |
          # SN selects clang via LLVM_BIN (Discover.discover -> `where "$LLVM_BIN:clang.exe"`), so pointing it at the
          # MSYS2 clang64 toolchain (which targets x86_64-w64-windows-gnu) forces the MinGW path and bypasses the
          # MSVC-targeting system clang entirely. vcvarsall is intentionally NOT run for this cell.
          C:\msys64\usr\bin\pacman -S --needed --noconfirm mingw-w64-clang-x86_64-toolchain
          "LLVM_BIN=C:\msys64\clang64\bin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: "[${{ matrix.classifier }}${{ matrix.env && format(' ({0})', matrix.env) || '' }}]: Unit tests"
        shell: bash
        run: ./project/scripts/run-sbt.sh -batch "test"
      - name: "[${{ matrix.classifier }}${{ matrix.env && format(' ({0})', matrix.env) || '' }}]: Scripted tests"
        shell: bash
        run: ./project/scripts/run-sbt.sh -batch "scripted"

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:17
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Coursier cache
        uses: coursier/cache-action@v8
      - name: Verify Source Formatting
        id: scalafmt
        continue-on-error: true
        run: sbt -batch scalafmtCheckAll scalafmtSbtCheck
      - name: Verify Linting Conformity
        id: scalafix
        continue-on-error: true
        run: sbt -batch "scalafixAll --check"
      - name: Verify File Header Conformity
        id: headers
        continue-on-error: true
        run: sbt -batch headerCheckAll
      - name: Check for failures
        if: always()
        env:
          FMT_OUTCOME: ${{ steps.scalafmt.outcome }}
          FIX_OUTCOME: ${{ steps.scalafix.outcome }}
          HDR_OUTCOME: ${{ steps.headers.outcome }}
        run: |
          failed=""
          [[ "$FMT_OUTCOME" == "failure" ]] && failed="$failed scalafmtCheckAll"
          [[ "$FIX_OUTCOME" == "failure" ]] && failed="$failed scalafixAll"
          [[ "$HDR_OUTCOME" == "failure" ]] && failed="$failed headerCheckAll"
          
          if [[ -n "$failed" ]]; then
            echo "::error::Static analysis checks failed:$failed"
            exit 1
          fi

  publish:
    name: Publish
    needs: [ tests, static-analysis ]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:17
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Import signing key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.OSS_PUBLISH_USER_SIGNING_KEY }}
      - name: Set up Coursier cache
        uses: coursier/cache-action@v8
      - name: ${{ startsWith(github.ref, 'refs/tags/v') && 'Assemble Release' || 'Publish Snapshots' }}
        run: sbt -batch publishSigned
        env:
          SONATYPE_USERNAME: ${{ secrets.OSS_PUBLISH_USER }}
          SONATYPE_PASSWORD: ${{ secrets.OSS_PUBLISH_USER_PASSPHRASE }}
      - name: Maven Central Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: sbt -batch sonaUpload sonaRelease
        env:
          SONATYPE_USERNAME: ${{ secrets.OSS_PUBLISH_USER }}
          SONATYPE_PASSWORD: ${{ secrets.OSS_PUBLISH_USER_PASSPHRASE }}

  release:
    name: GitHub Release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Mint Release Bot Token
        id: release-bot
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ steps.release-bot.outputs.token }}
        run: |
          prerelease_flag=""
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            $prerelease_flag
